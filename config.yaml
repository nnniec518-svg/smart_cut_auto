# ==================== 数字约束配置 ====================
number_constraint:
  enabled: true                    # 是否启用数字硬约束（启用以避免金额不匹配）
  mismatch_penalty: 10.0           # 数字不匹配惩罚分数（设置为极低值以排除候选）

# ==================== 片段合并配置 ====================
segment_merge:
  enabled: true                    # 是否启用连续片段拼接
  max_combine_count: 3             # 最多合并的片段数量
  min_gap_sec: 1.0                 # 允许的最大时间间隔（秒）

# ==================== 匹配权重配置 ====================
match_weights:
  keyword: 0.20      # 关键词命中权重（从 0.40 降低以提高语义匹配）
  semantic: 0.70      # 语义相似度权重（从 0.50 提高以增强语义理解）
  edit: 0.10          # 编辑距离权重

# ==================== 匹配惩罚参数 ====================
matching:
  # 非连续重复惩罚
  penalty_repeat: 0.8

  # 时间倒流惩罚
  penalty_time_reverse: 1.0

  # 顺序保持奖励
  reward_sequence: 0.2

  # 最低相似度阈值
  threshold: 0.6                  # 最低相似度，低于此值的片段不入选

  # B-Roll 后备阈值
  b_roll_fallback_threshold: 0.3   # B-Roll 后备阈值

# ==================== 时长控制配置 ====================
duration_control:
  enabled: true                    # 是否启用时长控制
  target_duration: [15, 30]       # 目标时长范围（秒）[下限, 上限]
  remove_lowest_quality: true      # 超时时是否删除低质量片段

# ==================== 规划器配置 ====================
planner:
  # 惩罚参数
  penalty_repeat: 0.8              # 非连续重复惩罚
  penalty_time_reverse: 0.5        # 时间倒流惩罚
  penalty_hard_time_reverse: 1.0    # 严重时间回溯惩罚（同视频内回跳）
  reward_sequence: 0.2             # 顺序保持奖励
  penalty_number_mismatch: 0.4      # 数字不匹配惩罚

  # 阈值
  a_roll_threshold: 0.25           # A_ROLL 最低相似度阈值（从 0.30 降低）
  b_roll_threshold: 0.08           # B_ROLL 最低相似度阈值（从 0.10 降低）

  # 平局决胜参数
  tiebreak_threshold: 0.05         # 平局判定阈值
  latest_recording_bonus: 0.01     # 末次优先奖励分数

  # 动态窗口参数
  window_initial_percent: 0.20     # 初始窗口覆盖前20%
  window_expansion: 1.5            # 窗口扩展系数
  window_min_size: 10              # 最小窗口大小（句数）

# ==================== 开拍提示词正则 ====================
cue_words:
  # 用于检测 321、开始、action 等提示词
  patterns:
    - "一"
    - "二"
    - "三"
    - "四"
    - "五"
    - "1"
    - "2"
    - "3"
