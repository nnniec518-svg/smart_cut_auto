# 智能剪辑系统配置文件
# smart_cut_auto config.yaml

# ==================== 模型配置 ====================
models:
  # FunASR 模型路径
  asr_model: "iic/speech_paraformer-large_asr_nat-zh-cn-16k-common-vocab8404-pytorch"
  
  # BGE-Large-ZH 中文向量模型（优化中文语义理解）
  # 注意：使用本地绝对路径，避免网络下载
  embedding_model: "C:/Users/nnniec/Program/smart_cut_auto/models/sentence_transformers/models--BAAI--bge-large-zh-v1.5/snapshots/79e7739b6ab944e86d6171e44d24c997fc1e0116"

  # 降级模型（本地已有缓存）
  fallback_embedding: "C:/Users/nnniec/Program/smart_cut_auto/models/sentence_transformers/models--BAAI--bge-large-zh-v1.5/snapshots/79e7739b6ab944e86d6171e44d24c997fc1e0116"

# ==================== VAD 参数配置 ====================
vad:
  # 最大单段时长（毫秒），防止背景音连在一起
  max_single_segment_time: 6000
  
  # 噪声阈值 (0-1)，越高越严格，过滤远处低能量人声
  speech_noise_thres: 0.6
  
  # 合并段长度（毫秒）
  merge_length: 1500
  
  # chunk大小（毫秒）
  chunk_size: 200

# ==================== 逻辑过滤配置 ====================
filter:
  # 双重阈值过滤
  min_text_length: 3           # 最少文字数
  min_confidence: 0.8           # 最低置信度
  max_no_speech_prob: 0.5       # 最大无语音概率
  
  # 语义去重
  dedup_similarity_threshold: 0.8  # 相似度阈值
  
  # 物理安全边界
  min_final_duration: 0.4       # 最小最终时长(秒)
  
  # A/B Roll 打分权重
  score_weights:
    text_length: 0.30           # 文本长度权重
    confidence: 0.40             # 置信度权重
    audio_energy: 0.30          # 音频能量权重
  
  # A-Roll 入围分数
  a_roll_threshold: 70

  # 逻辑版本（用于缓存强制刷新）
  # 修改此版本号将强制清理所有缓存
  logic_version: "2.0"

# ==================== 数据库配置 ====================
database:
  # SQLite 数据库路径
  path: "storage/materials.db"
  
  # 断点续传：mtime 匹配容差（秒）
  mtime_tolerance: 1.0

# ==================== 素材目录配置 ====================
paths:
  # 原始素材文件夹
  raw_folder: "storage/materials-all"
  
  # 输出目录
  output_dir: "temp"
  
  # 日志目录
  logs_dir: "logs"

# ==================== FFmpeg 渲染参数 ====================
render:
  # 目标分辨率
  width: 1080
  height: 1920
  
  # 目标帧率
  fps: 30
  
  # 音频采样率
  sample_rate: 44100
  
  # 视频编码器
  video_codec: "libx264"
  
  # 编码质量 (CRF, 数值越小质量越高)
  crf: 18
  
  # 音频码率
  audio_bitrate: "128k"
  
  # 淡入淡出时长（秒）
  crossfade_duration: 0.2

# ==================== 画中画配置 ====================
overlay:
  enabled: true                    # 是否启用画中画叠加
  position: "bottom-right"         # 位置: top-left, top-right, bottom-left, bottom-right
  scale: 0.3                     # 缩放比例（0-1）
  opacity: 0.8                   # 不透明度（0-1）
  margin: 10                      # 边距（像素）

# ==================== 素材分类阈值 ====================
classification:
  # 静音阈值 (dB) - 提高以过滤底噪伪口播
  silence_threshold: -40

  # A_ROLL 最小相似度阈值（从 0.30 降低以提高匹配率）
  a_roll_threshold: 0.25

  # B_ROLL 最小相似度阈值（从 0.10 降低）
  b_roll_threshold: 0.08

# ==================== 评分器配置 ====================
evaluator:
  # 评分权重
  score_weights:
    vad_ratio: 0.30              # VAD 占比权重
    energy: 0.25                 # 能量得分权重
    length: 0.20                 # 长度得分权重
    semantic_integrity: 0.25       # 语义完整性权重

  # 阈值设置
  min_score: 0.65                # 最低入围分数
  min_text_length: 3              # 最少文字数
  min_text_duration: 0.5          # 最少文字时长 (秒)
  min_final_duration: 0.4          # 最小最终时长 (秒)
  min_audio_db: -45               # 最低音频分贝

  # 去重配置
  dedup_similarity_threshold: 0.85 # 相似度阈值
  dedup_min_score: 0.65           # 参与去重的最低分数

  # 能量归一化参数
  energy_min_db: -50              # -50dB = 0分
  energy_max_db: -10              # -10dB = 100分

# ==================== 本地生活纠错词典 ====================
